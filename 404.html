<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stránka sa nenašla · Trenčín</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🏰</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,560&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --polnoc:#0B0F16; --pergamen:#EAE4D6; --kamen:#97A0B0; --zlato:#C89B5A; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100svh; display: grid; place-items: center;
    background: var(--polnoc); color: var(--pergamen);
    font-family: 'DM Sans', sans-serif; text-align: center; padding: 24px;
  }
  h1 { font-family: 'Fraunces', serif; font-size: clamp(4rem, 16vw, 9rem); margin: 0; letter-spacing: 0.03em; }
  h1 span { color: var(--zlato); }
  p { color: var(--kamen); max-width: 30rem; margin: 16px auto 32px; }
  a {
    display: inline-block; background: var(--zlato); color: var(--polnoc);
    padding: 14px 28px; border-radius: 6px; font-weight: 700; text-decoration: none;
    transition: background 0.15s ease, transform 0.12s ease;
  }
  a:hover { background: #D9B172; transform: translateY(-1px); }
  a:focus-visible { outline: 2px solid var(--zlato); outline-offset: 3px; }
</style>
</head>
<body>
<main>
  <h1>4<span>0</span>4</h1>
  <p>Táto stránka sa stratila niekde v hradnom podzemí. Studňa lásky má 80 metrov — tak hlboko kopať nebudeme.</p>
  <a href="index.html">Späť do mesta</a>
</main>
</body>
</html>
